apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: cloud-native-project
type: Opaque
stringData:
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "SuperSecretPassword123!"
  POSTGRES_DB: "appdb"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: cloud-native-project
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: cloud-native-project
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-config-reader
  namespace: cloud-native-project
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: cloud-native-project
subjects:
- kind: ServiceAccount
  name: backend-sa
roleRef:
  kind: Role
  name: backend-config-reader
  apiGroup: rbac.authorization.k8s.io
