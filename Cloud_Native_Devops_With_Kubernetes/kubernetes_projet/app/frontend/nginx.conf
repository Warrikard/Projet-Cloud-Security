server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # RETIRE LE SLASH A LA FIN ICI :
        proxy_pass http://backend-service:3000;
        proxy_set_header Host $host;
    }
}
